spring.application.name=backend

# --- Gizli bilgiler (.env) ---
# .env dosyasi (proje kokunde, backend/.env) properties formatinda okunur.
# Dosya yoksa "optional:" sayesinde hata vermez, sadece asagidaki degerler tanimsiz kalir.
# .env git'e commitlenmez (.gitignore); ornek sablon icin .env.example dosyasina bak.
spring.config.import=optional:file:.env[.properties]

# --- PostgreSQL Baglanti Ayarlari ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/surumnotu}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Ayarlari ---
# ddl-auto=update -> Entity siniflarina bakarak eksik tablo/kolonlari otomatik olusturur (Code-First yaklasimi)
spring.jpa.hibernate.ddl-auto=update
# Hibernate'in calistirdigi SQL sorgularini konsolda goster (ogrenme asamasinda faydali)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Ayarlari ---
# Secret .env dosyasindan okunur, kod icine yazilmaz
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# --- Ilk Admin Kullanicisi ---
# Bos birakilirsa (deger tanimsizsa) admin seed adimi atlanir
admin.username=${ADMIN_USERNAME:}
admin.password=${ADMIN_PASSWORD:}
