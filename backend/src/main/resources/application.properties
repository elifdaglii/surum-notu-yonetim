spring.application.name=backend

# --- PostgreSQL Baglanti Ayarlari ---
spring.datasource.url=jdbc:postgresql://localhost:5432/surumnotu
spring.datasource.username=postgres
spring.datasource.password=sifre123
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Ayarlari ---
# ddl-auto=update -> Entity siniflarina bakarak eksik tablo/kolonlari otomatik olusturur (Code-First yaklasimi)
spring.jpa.hibernate.ddl-auto=update
# Hibernate'in calistirdigi SQL sorgularini konsolda goster (ogrenme asamasinda faydali)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
